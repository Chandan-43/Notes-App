<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <section id="home-view">
      <div class="container">
        <header>
          <h1>My Notes</h1>
        </header>
        <div class="tabs">
          <button id="permanent-btn">Permanent Notes</button>
          <button id="temporary-btn">Temporary Notes</button>
        </div>
      </div>
    </section>


    <section id="temporary-view" class="hidden">
      <button id="back-btn">&#x21e6;</button>
      <div class="container">
        <header>
            <h1>Temporary Notes</h1>
        </header>
        <div class="input-container">
          <input type="text" id="todo-input" placeholder="Add a new task..." />
          <button id="add-task-btn">Add Note</button>
        </div>
        <ul id="todo-list"></ul>
      </div>
    </section>

    <script src="script.js"></script>

  </body>
</html>
